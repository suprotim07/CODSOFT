<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suprotim Sannyal | Interactive Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <input type="text" id="display" readonly placeholder="0">

        <div class="buttons-grid">
            <button class="btn clear" onclick="clearDisplay()">C</button>
            <button class="btn operator" onclick="appendValue('/')">÷</button>
            <button class="btn operator" onclick="appendValue('*')">×</button>
            <button class="btn operator" onclick="deleteLast()">DEL</button>

            <button class="btn font-num" onclick="appendValue('7')">7</button>
            <button class="btn font-num" onclick="appendValue('8')">8</button>
            <button class="btn font-num" onclick="appendValue('9')">9</button>
            <button class="btn operator" onclick="appendValue('-')">−</button>

            <button class="btn font-num" onclick="appendValue('4')">4</button>
            <button class="btn font-num" onclick="appendValue('5')">5</button>
            <button class="btn font-num" onclick="appendValue('6')">6</button>
            <button class="btn operator" onclick="appendValue('+')">+</button>

            <button class="btn font-num" onclick="appendValue('1')">1</button>
            <button class="btn font-num" onclick="appendValue('2')">2</button>
            <button class="btn font-num" onclick="appendValue('3')">3</button>
            <button class="btn equal" onclick="calculateResult()">=</button>

            <button class="btn font-num zero" onclick="appendValue('0')">0</button>
            <button class="btn font-num" onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
